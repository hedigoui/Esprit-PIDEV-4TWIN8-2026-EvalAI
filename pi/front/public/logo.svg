<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="EvalAI logo">
  <defs>
    <linearGradient id="iconBackground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2b2b2b"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
    <linearGradient id="micAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ededed"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g transform="translate(56 70)" filter="url(#logoShadow)">
    <circle cx="0" cy="0" r="44" fill="url(#iconBackground)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="37" fill="none" stroke="rgba(227,24,55,0.18)" stroke-width="1.2"/>

    <rect x="-11" y="-28" width="22" height="36" rx="11" fill="url(#micAccent)"/>
    <line x1="-6" y1="-21" x2="6" y2="-21" stroke="#d22" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6" y1="-13" x2="6" y2="-13" stroke="#7a7a7a" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6" y1="-5" x2="6" y2="-5" stroke="#222222" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-6" y1="3" x2="6" y2="3" stroke="#d22" stroke-width="1.8" stroke-linecap="round"/>

    <path d="M -20 -1 Q -20 20 0 20 Q 20 20 20 -1" fill="none" stroke="#f4f4f4" stroke-width="4.2" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="0" y2="34" stroke="#f4f4f4" stroke-width="4.2" stroke-linecap="round"/>

    <path d="M -30 -13 Q -36 -1 -30 11" fill="none" stroke="#e31837" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M 30 -13 Q 36 -1 30 11" fill="none" stroke="#e31837" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <g>
    <text x="120" y="92" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-0.5">Eval</text>
    <text x="220" y="92" fill="#e31837" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-0.5">AI</text>
  </g>
</svg>
