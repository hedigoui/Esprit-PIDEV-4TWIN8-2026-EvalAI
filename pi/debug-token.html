<!DOCTYPE html>
<html>
<head>
    <title>Token Debugger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .label {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .value {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }
        .error {
            color: #e31837;
        }
        .success {
            color: #22c55e;
        }
        .warning {
            color: #f59e0b;
        }
        button {
            background: #e31837;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #c01530;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>🔍 Token & Authentication Debugger</h1>
    
    <div class="section">
        <div class="label">Token Status:</div>
        <div class="value" id="tokenStatus"></div>
    </div>
    
    <div class="section">
        <div class="label">User Data from localStorage:</div>
        <div class="value" id="user"></div>
    </div>
    
    <div class="section">
        <div class="label">Decoded Token Payload:</div>
        <div class="value" id="decoded"></div>
    </div>
    
    <div class="section">
        <div class="label">Token Expiration:</div>
        <div class="value" id="expiration"></div>
    </div>
    
    <div class="section">
        <div class="label">Role Check:</div>
        <div class="value" id="roleCheck"></div>
    </div>

    <div class="section">
        <div class="label">Test API Call:</div>
        <div class="value" id="apiTest">Click button below to test...</div>
        <button onclick="testAPI()">Test /reclamations/me</button>
        <button onclick="clearAndReload()">Clear Token & Reload</button>
    </div>

    <script>
        // Get token
        const token = localStorage.getItem('token');
        
        if (!token) {
            document.getElementById('tokenStatus').innerHTML = '<span class="error">❌ No token found in localStorage</span>';
        } else {
            document.getElementById('tokenStatus').innerHTML = '<span class="success">✅ Token exists</span>';
        }
        
        // Get user
        const userStr = localStorage.getItem('user');
        if (userStr) {
            try {
                const user = JSON.parse(userStr);
                document.getElementById('user').innerHTML = `<pre>${JSON.stringify(user, null, 2)}</pre>`;
            } catch (e) {
                document.getElementById('user').innerHTML = `<span class="error">Error parsing: ${e.message}</span>`;
            }
        } else {
            document.getElementById('user').textContent = 'No user found';
        }
        
        // Decode token
        if (token) {
            try {
                const parts = token.split('.');
                if (parts.length === 3) {
                    const payload = JSON.parse(atob(parts[1]));
                    document.getElementById('decoded').innerHTML = `<pre>${JSON.stringify(payload, null, 2)}</pre>`;
                    
                    // Check expiration
                    if (payload.exp) {
                        const expDate = new Date(payload.exp * 1000);
                        const now = new Date();
                        const isExpired = expDate < now;
                        const timeLeft = expDate - now;
                        const hoursLeft = Math.floor(timeLeft / (1000 * 60 * 60));
                        const minutesLeft = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                        
                        document.getElementById('expiration').innerHTML = `
                            <div>Expires: ${expDate.toLocaleString()}</div>
                            <div class="${isExpired ? 'error' : 'success'}">
                                ${isExpired ? '❌ TOKEN EXPIRED!' : `✅ Valid for ${hoursLeft}h ${minutesLeft}m`}
                            </div>
                        `;
                    } else {
                        document.getElementById('expiration').innerHTML = '<span class="warning">⚠️ No expiration in token</span>';
                    }
                } else {
                    document.getElementById('decoded').innerHTML = '<span class="error">Invalid token format</span>';
                }
            } catch (e) {
                document.getElementById('decoded').innerHTML = `<span class="error">Error decoding: ${e.message}</span>`;
            }
        }
        
        // Check role
        if (userStr && token) {
            try {
                const user = JSON.parse(userStr);
                const payload = JSON.parse(atob(token.split('.')[1]));
                const roleMatch = payload.role === user.role;
                document.getElementById('roleCheck').innerHTML = `
                    <div>User role: <strong>${user.role}</strong></div>
                    <div>Token role: <strong>${payload.role}</strong></div>
                    <div class="${roleMatch ? 'success' : 'error'}">
                        ${roleMatch ? '✅ Roles MATCH' : '❌ Roles MISMATCH'}
                    </div>
                `;
            } catch (e) {
                document.getElementById('roleCheck').innerHTML = `<span class="error">Error: ${e.message}</span>`;
            }
        }

        async function testAPI() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:3000/reclamations/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('apiTest').innerHTML = `
                        <div class="success">✅ API call successful!</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    document.getElementById('apiTest').innerHTML = `
                        <div class="error">❌ API call failed: ${response.status}</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('apiTest').innerHTML = `
                    <div class="error">❌ Network error: ${error.message}</div>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Test /reclamations/me';
            }
        }

        function clearAndReload() {
            if (confirm('This will clear your token and user data. Continue?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                location.reload();
            }
        }
    </script>
</body>
</html>
