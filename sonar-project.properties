# Project identification
sonar.projectKey=pi-last
sonar.projectName=Pi-Last - Oral AI Performance Platform
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=back/src,front/src
sonar.exclusions=**/*.spec.ts,**/*.test.js,**/node_modules/**,**/dist/**,**/build/**

# Test files location
sonar.tests=back/src,front/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.js

# Coverage reports (LCOV format for TypeScript/JavaScript)
sonar.javascript.lcov.reportPaths=back/coverage/lcov.info
sonar.typescript.lcov.reportPaths=back/coverage/lcov.info

# Coverage reports (Cobertura format)
sonar.coverageReportPaths=back/coverage/cobertura-coverage.xml

# Source encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ts

# Specific test results
sonar.junit.reportPaths=back/coverage/test-results.xml

# Quality gates
sonar.qualitygate.wait=true

# Host URL (change as needed for your environment)
sonar.host.url=http://localhost:9000

# Login token (use environment variable for CI/CD)
# sonar.login=${SONAR_LOGIN_TOKEN}

# Working directory
sonar.working.directory=.

# Ignore coverage for node_modules and dist
sonar.coverage.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/test/**

